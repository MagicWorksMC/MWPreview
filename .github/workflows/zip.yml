name: Create Archive
on:
  push:
    paths:
      - "assets/**"
      - "README.md"
      - "pack.mcmeta"
      - "pack.png"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Pull latest and remove old file from repo
      run: |
        git config pull.rebase false
        git pull
        rm -f MWPreview-Release.zip

    - name: Archive Release
      uses: thedoctor0/zip-release@master
      with:
        filename: 'MWPreview-Release.zip'
        exclusions: '*.git* /*node_modules/* .editorconfig'

    - name: Push changes to remote with previous commit info
      run: |
        # Get previous commit message and author
        COMMIT_MSG="$(git log -1 --pretty=%B)"
        COMMIT_AUTHOR_NAME="${{github.event.commits[0].author.username}}"
        COMMIT_AUTHOR_EMAIL="$(git log -1 --pretty=%ae)"
        FINAL_MSG="Updated Archive - $COMMIT_AUTHOR_NAME - $COMMIT_MSG"

        # Configure git with auto-zip author
        git config user.name "Auto-Zip"
        git config user.email "41898282+github-actions[bot]@://github.com"

        # Commit using previous message and author
        git add -A
        git commit -m "$FINAL_MSG" || echo "No changes to commit"
        git push --force
